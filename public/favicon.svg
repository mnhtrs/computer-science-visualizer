    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon points="60,105 180,170 180,300 60,235" fill="url(#leftFace)" stroke="url(#edgeGrad)" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="300,105 180,170 180,300 300,235" fill="url(#rightFace)" stroke="url(#edgeGrad)" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="180,40 300,105 180,170 60,105" fill="url(#topFace)" stroke="url(#edgeGrad)" stroke-width="5" stroke-linejoin="round"/>
  <g clip-path="url(#topClip)">
    <path d="M 103,105 Q 180,61 257,105 Q 180,149 103,105 Z" fill="#f4f1f8" stroke="#3a3a3a" stroke-width="2.5"/>
    <circle cx="180" cy="105" r="22" fill="#4a3222"/>
