<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9aef7"/>
      <stop offset="100%" stop-color="#a186de"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9aef7"/>
      <stop offset="100%" stop-color="#a186de"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9aef7"/>
      <stop offset="100%" stop-color="#a186de"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd9f2"/>
      <stop offset="35%" stop-color="#d8c8ff"/>
      <stop offset="70%" stop-color="#bcd6ff"/>
      <stop offset="100%" stop-color="#adf5e6"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d685ff"/>
      <stop offset="50%" stop-color="#b158f2"/>
      <stop offset="100%" stop-color="#8a3ade"/>
